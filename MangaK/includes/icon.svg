<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">MK cutout manga app icon</title>
  <desc id="desc">A red manga app icon with a black ink slab and bold white slanted MK cutout lettering.</desc>
  <defs>
    <filter id="shadow" x="8" y="8" width="240" height="240" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="15" flood-color="#020617" flood-opacity="0.22"/>
    </filter>
    <linearGradient id="red" x1="38" y1="28" x2="222" y2="224" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FF5A64"/>
      <stop offset="0.42" stop-color="#E63946"/>
      <stop offset="1" stop-color="#B80F24"/>
    </linearGradient>
    <clipPath id="badgeClip">
      <circle cx="128" cy="128" r="104"/>
    </clipPath>
  </defs>

  <g filter="url(#shadow)">
    <circle cx="128" cy="128" r="104" fill="url(#red)"/>
    <circle cx="128" cy="128" r="94" stroke="#0F172A" stroke-width="8"/>
  </g>

