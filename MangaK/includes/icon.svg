    <path d="M33 190L227 151" stroke="#FFFFFF" stroke-width="4" opacity="0.14" stroke-linecap="round"/>
  </g>

  <g transform="rotate(-10 128 128)">
    <text x="128" y="164" text-anchor="middle" fill="#0F172A" stroke="#0F172A" stroke-width="18" stroke-linejoin="round" paint-order="stroke" font-family="Arial Black, Impact, Inter, ui-sans-serif, system-ui, sans-serif" font-size="112" font-weight="950" font-style="italic" letter-spacing="-7">MK</text>
    <text x="128" y="164" text-anchor="middle" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="2.5" stroke-linejoin="round" paint-order="stroke" font-family="Arial Black, Impact, Inter, ui-sans-serif, system-ui, sans-serif" font-size="112" font-weight="950" font-style="italic" letter-spacing="-7">MK</text>
  </g>

  <path d="M38 64H79M29 86H63M187 58H222M198 80H236" stroke="#0F172A" stroke-width="6" stroke-linecap="round"/>
